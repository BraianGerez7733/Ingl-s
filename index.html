<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>English Fun</title></head>
<body style="font-family:Arial;text-align:center;background:#fff7ad">
<h1>Aprender inglés jugando 🎉</h1>
<div id="card" style="background:white;padding:30px;border-radius:20px;margin:20px"></div>
<button onclick="next()">Siguiente</button>
<script>
const phrases=[
// Ainhara (5)
{e:"Ainhara is amazing!",s:"¡Ainhara es increíble!"},
{e:"Ainhara learns fast!",s:"¡Ainhara aprende rápido!"},
{e:"Ainhara is happy!",s:"¡Ainhara está feliz!"},
{e:"Ainhara loves English!",s:"¡Ainhara ama el inglés!"},
{e:"Ainhara can do it!",s:"¡Ainhara puede hacerlo!"},
// Sofía (5)
{e:"Sofía is amazing!",s:"¡Sofía es increíble!"},
{e:"Sofía learns fast!",s:"¡Sofía aprende rápido!"},
{e:"Sofía is happy!",s:"¡Sofía está feliz!"},
{e:"Sofía loves English!",s:"¡Sofía ama el inglés!"},
{e:"Sofía can do it!",s:"¡Sofía puede hacerlo!"},
// juntas (10)
{e:"Ainhara and Sofía are awesome!",s:"¡Ainhara y Sofía son geniales!"},
{e:"Ainhara and Sofía learn together!",s:"¡Aprenden juntas!"},
{e:"Ainhara and Sofía are a team!",s:"¡Son un equipo!"},
{e:"Ainhara and Sofía are happy!",s:"¡Están felices!"},
{e:"Ainhara and Sofía love English!",s:"¡Aman el inglés!"},
{e:"Ainhara and Sofía play and learn!",s:"¡Juegan y aprenden!"},
{e:"Ainhara and Sofía are smart!",s:"¡Son inteligentes!"},
{e:"Ainhara and Sofía shine!",s:"¡Brillan!"},
{e:"Ainhara and Sofía are the best!",s:"¡Son las mejores!"},
{e:"Ainhara and Sofía never give up!",s:"¡Nunca se rinden!"}
];
let i=Math.floor(Math.random()*phrases.length);
function show(){document.getElementById('card').innerHTML=`<h2>${phrases[i].e}</h2><p>${phrases[i].s}</p>`}
function next(){i=Math.floor(Math.random()*phrases.length);show()}
show();
</script>
</body></html>
