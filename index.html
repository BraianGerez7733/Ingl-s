<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>English Fun Lab</title></head><body style="font-family:Arial;text-align:center;background:#fff7ad"><h1>Aprender inglés ✨</h1><div id="card" style="background:white;padding:30px;border-radius:20px;margin:20px"></div><button onclick="next()">Siguiente</button><script>
